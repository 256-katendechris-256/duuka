name: duuka
description: Duuka - Simple inventory management for Ugandan SMEs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10

  # Navigation
  go_router: ^13.0.0

  # UI
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.9

  # Camera & Scanning
  mobile_scanner: ^4.0.1
  image_picker: ^1.0.7

  # Networking & Connectivity
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0
  local_auth: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
