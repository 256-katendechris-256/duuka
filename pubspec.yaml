name: duuka
description: Duuka - Simple inventory management for Ugandan SMEs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  hive_flutter: ^1.1.0

  # Google Sign-In (for Supabase OAuth)
  google_sign_in: ^6.2.1

  # Supabase
  supabase_flutter: ^2.3.0

  # Security
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # Device Info
  device_info_plus: ^9.1.2
  package_info_plus: ^4.2.0

  # Navigation
  go_router: ^13.0.0

  # UI
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.9

  # Camera & Scanning
  mobile_scanner: ^4.0.1
  image_picker: ^1.0.7

  # Networking & Connectivity
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  path_provider: ^2.1.1
  path: ^1.8.3
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  app_links: ^6.4.0
  permission_handler: ^11.1.0
  local_auth: ^2.1.7
  csv: ^6.0.0
  excel: ^4.0.3
  file_picker: ^8.0.0
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
